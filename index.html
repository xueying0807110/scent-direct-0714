<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumora Scented Candle — Direct Display</title>
  <style>
    :root {
      --text: #111111;
      --muted: #666666;
      --border: #d8d8d8;
      --soft: #f7f7f7;
      --white: #ffffff;
      --error: #a00018;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      background: var(--white);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.01em;
      overflow-x: hidden;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: auto;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      align-items: start;
    }

    .details {
      min-height: 500px;
      padding: 2px;
      display: flex;
      flex-direction: column;
    }

    .category {
      margin-bottom: 10px;
      color: #707070;
      font-size: 10px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .product-brand {
      margin-bottom: 7px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 27px;
      line-height: 1;
      letter-spacing: 0.13em;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 400;
    }

    .price {
      margin-bottom: 3px;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
    }

    .divider {
      margin: 16px 0 15px;
      border-top: 1px solid var(--border);
    }

    .field {
      margin-bottom: 12px;
    }

    .field-header {
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .option-count {
      color: var(--muted);
      font-size: 10.5px;
      white-space: nowrap;
    }

    .scent-options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
    }

    .scent-option {
      min-height: 28px;
      padding: 4px 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--white);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      line-height: 1.2;
      text-align: left;
      cursor: pointer;
    }

    .scent-option:hover,
    .scent-option:focus-visible {
      border-color: #111;
      outline: none;
    }

    .scent-option.is-selected {
      border-color: #111;
      background: #fafafa;
      color: #111;
      font-weight: 600;
      box-shadow: inset 3px 0 0 #111;
    }

    .action-area {
      margin-top: 10px;
    }

    .decision-message {
      display: block;
      min-height: 18px;
      margin: 0 0 6px;
      color: var(--error);
      font-size: 12px;
      line-height: 18px;
      visibility: hidden;
      opacity: 0;
    }

    .decision-message.is-visible {
      visibility: visible;
      opacity: 1;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .button {
      width: 100%;
      height: 42px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .button:hover {
      background: #2b2b2b;
      border-color: #2b2b2b;
    }

    .button:focus-visible {
      outline: 2px solid #111;
      outline-offset: 2px;
    }

    .image-panel {
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #eeeeee;
      background: var(--soft);
    }

    .product-image {
      width: 90%;
      height: 470px;
      object-fit: contain;
      display: block;
    }

    @media (max-width: 720px) {
      body {
        min-height: auto;
        display: block;
      }

      .page {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 16px 18px 20px;
      }

      .details { min-height: auto; }
      .image-panel { min-height: 360px; order: -1; }
      .product-image { width: 92%; height: 340px; }
      .action-area { margin-top: 12px; }
      .scent-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="details" aria-label="Product selection area">
      <div class="category">Home Fragrance</div>
      <div class="product-brand">LUMORA</div>
      <h1>Classic Glass Scented Candle</h1>
      <div class="price">$18</div>

      <div class="divider" aria-hidden="true"></div>

      <div class="field" id="scentField">
        <div class="field-header">
          <span class="field-label" id="scentLabel">Available scents</span>
          <span class="option-count">9 options</span>
        </div>

        <div
          class="scent-options"
          id="scentOptions"
          role="listbox"
          aria-labelledby="scentLabel"
          aria-label="Available scent options"
        ></div>
      </div>

      <div class="action-area">
        <div class="decision-message" id="decisionMessage" role="alert"></div>

        <div class="button-row">
          <button class="button" type="button" data-action="add_to_cart">Add to cart</button>
          <button class="button" type="button" data-action="leave">Leave</button>
        </div>
      </div>
    </section>

    <section class="image-panel" aria-label="Product image area">
      <img
        class="product-image"
        src="product-image.png"
        alt="Lumora scented candle with a silver lid"
      />
    </section>
  </main>

  <script>
    const SCENTS = [
      'Fresh Linen',
      'Clean Cotton',
      'Green Tea',
      'Citrus',
      'Lemon Verbena',
      'Eucalyptus',
      'Sea Salt',
      'Sandalwood',
      'Cedarwood'
    ];

    const scentOptions = document.getElementById('scentOptions');
    const decisionMessage = document.getElementById('decisionMessage');
    const buttonRow = document.querySelector('.button-row');

    let selectedScent = '';
    let scentOrder = [];
    let pageOpenTime = new Date().toISOString();
    const pageOpenTimestamp = Date.now();
    let firstOptionReviewTime = '';
    let firstOptionClickTime = '';
    let optionClicks = 0;
    let firstChoiceClicked = '';
    const choiceClickSequence = [];
    const choiceClickHistory = [];
    const choiceClickCounts = Object.fromEntries(SCENTS.map((scent) => [scent, 0]));
    const uniqueChoicesClicked = [];
    let choiceSwitchCount = 0;
    let addToCartClicks = 0;
    let leaveClicks = 0;
    let invalidButtonClicks = 0;
    let buttonsEnabledTime = pageOpenTime;
    let optionReviewed = '0';
    const optionHoverStats = Object.fromEntries(SCENTS.map((scent) => [scent, {
      enterCount: 0,
      totalDurationMs: 0,
      visits: []
    }]));
    let activeHover = null;

    function reportContentHeight() {
      window.parent.postMessage({
        type: 'lumora_resize',
        height: Math.ceil(document.documentElement.scrollHeight)
      }, '*');
    }

    function shuffleArray(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function markOptionsReviewed() {
      optionReviewed = '1';
      if (!firstOptionReviewTime) {
        firstOptionReviewTime = new Date().toISOString();
      }
      decisionMessage.classList.remove('is-visible');
      reportContentHeight();
    }

    function startOptionHover(option) {
      const choice = option.dataset.value || '';
      if (!choice || (activeHover && activeHover.option === option)) return;
      endOptionHover();
      const now = Date.now();
      optionHoverStats[choice].enterCount += 1;
      activeHover = { option, choice, startTimestamp: new Date(now).toISOString(), startElapsedMs: now - pageOpenTimestamp, startMs: now };
    }

    function endOptionHover(option = null) {
      if (!activeHover || (option && activeHover.option !== option)) return;
      const now = Date.now();
      const durationMs = Math.max(0, now - activeHover.startMs);
      const stats = optionHoverStats[activeHover.choice];
      stats.totalDurationMs += durationMs;
      stats.visits.push({
        startTimestamp: activeHover.startTimestamp,
        endTimestamp: new Date(now).toISOString(),
        startElapsedMs: activeHover.startElapsedMs,
        endElapsedMs: now - pageOpenTimestamp,
        durationMs
      });
      activeHover = null;
    }


    function recordChoiceSelection(choice, inputMethod) {
      const timestamp = new Date().toISOString();
      const elapsedMs = Date.now() - pageOpenTimestamp;
      const previousChoice = choiceClickSequence.length
        ? choiceClickSequence[choiceClickSequence.length - 1]
        : '';

      if (!firstChoiceClicked) {
        firstChoiceClicked = choice;
      }

      if (previousChoice && previousChoice !== choice) {
        choiceSwitchCount += 1;
      }

      choiceClickSequence.push(choice);
      choiceClickCounts[choice] = (choiceClickCounts[choice] || 0) + 1;

      if (!uniqueChoicesClicked.includes(choice)) {
        uniqueChoicesClicked.push(choice);
      }

      choiceClickHistory.push({
        sequenceNumber: choiceClickSequence.length,
        choice,
        timestamp,
        elapsedMs,
        inputMethod
      });

      const liveInteraction = {
        type: 'lumora_choice_interaction',
        displayCondition: 'direct_display',
        presentationFormat: 'direct',
        choice,
        inputMethod,
        sequenceNumber: String(choiceClickSequence.length),
        choiceClickCountForThisOption: String(choiceClickCounts[choice]),
        firstChoiceClicked,
        lastChoiceClicked: choice,
        totalChoiceClicks: String(choiceClickSequence.length),
        uniqueChoicesClickedCount: String(uniqueChoicesClicked.length),
        choiceSwitchCount: String(choiceSwitchCount),
        choiceClickSequence: choiceClickSequence.join(' | '),
        choiceClickSequenceJSON: JSON.stringify(choiceClickSequence),
        choiceClickCountsJSON: JSON.stringify(choiceClickCounts),
        choiceClickHistoryJSON: JSON.stringify(choiceClickHistory),
        interactionTimestamp: timestamp,
        interactionElapsedMs: String(elapsedMs)
      };

      SCENTS.forEach((scent) => {
        const fieldKey = scent.replace(/[^A-Za-z0-9]/g, '');
        liveInteraction[`choiceClicks_${fieldKey}`] = String(choiceClickCounts[scent] || 0);
      });

      localStorage.setItem('lumoraChoiceTracking', JSON.stringify(liveInteraction));
      window.parent.postMessage(liveInteraction, '*');
    }

    function selectOption(option) {
      selectedScent = option.dataset.value || '';
      optionClicks += 1;
      markOptionsReviewed();

      if (!firstOptionClickTime) {
        firstOptionClickTime = new Date().toISOString();
      }

      recordChoiceSelection(selectedScent, 'pointer_click');

      scentOptions.querySelectorAll('.scent-option').forEach((item) => {
        const isSelected = item === option;
        item.classList.toggle('is-selected', isSelected);
        item.setAttribute('aria-selected', isSelected ? 'true' : 'false');
      });
    }

    function buildOptions() {
      scentOrder = shuffleArray(SCENTS);
      window.lumoraScentOrder = [...scentOrder];
      scentOptions.innerHTML = '';

      scentOrder.forEach((scent) => {
        const option = document.createElement('button');
        option.className = 'scent-option';
        option.type = 'button';
        option.setAttribute('role', 'option');
        option.setAttribute('aria-selected', 'false');
        option.dataset.value = scent;
        option.textContent = scent;
        scentOptions.appendChild(option);
      });
    }

    scentOptions.addEventListener('pointerenter', markOptionsReviewed);
    scentOptions.addEventListener('focusin', markOptionsReviewed);
    scentOptions.addEventListener('touchstart', markOptionsReviewed, { passive: true });

    scentOptions.addEventListener('click', (event) => {
      const option = event.target.closest('.scent-option');
      if (option) selectOption(option);
    });

    scentOptions.addEventListener('pointerover', (event) => {
      const option = event.target.closest('.scent-option');
      if (option && !option.contains(event.relatedTarget)) startOptionHover(option);
    });
    scentOptions.addEventListener('pointerout', (event) => {
      const option = event.target.closest('.scent-option');
      if (option && !option.contains(event.relatedTarget)) endOptionHover(option);
    });

    buttonRow.addEventListener('click', (event) => {
      const button = event.target.closest('.button');
      if (!button) return;

      const action = button.dataset.action || '';
      if (action === 'add_to_cart') addToCartClicks += 1;
      if (action === 'leave') leaveClicks += 1;

      if (action === 'add_to_cart' && !selectedScent) {
        invalidButtonClicks += 1;
        decisionMessage.textContent = 'Please select a scent before adding it to your cart.';
        decisionMessage.classList.add('is-visible');
        reportContentHeight();
        return;
      }

      if (action === 'leave' && optionReviewed !== '1') {
        invalidButtonClicks += 1;
        decisionMessage.textContent = 'Please review the scent options before leaving.';
        decisionMessage.classList.add('is-visible');
        reportContentHeight();
        return;
      }

      endOptionHover();
      const hoveredOptions = SCENTS.filter((scent) => optionHoverStats[scent].enterCount > 0);

      const result = {
        type: 'netlify_complete',
        action,
        choice: selectedScent,
        selectedScent,
        product: 'Lumora Classic Glass Scented Candle',
        price: '$18',
        productChosen: action === 'add_to_cart' ? '1' : '0',
        displayCondition: 'direct_display',
        presentationFormat: 'direct',
        pageOpenTime,
        firstOptionReviewTime,
        firstOptionClickTime,
        optionClicks: String(optionClicks),
        firstChoiceClicked,
        lastChoiceClicked: selectedScent,
        choiceClickSequence: choiceClickSequence.join(' | '),
        choiceClickSequenceJSON: JSON.stringify(choiceClickSequence),
        choiceClickHistoryJSON: JSON.stringify(choiceClickHistory),
        choiceClickCountsJSON: JSON.stringify(choiceClickCounts),
        uniqueChoicesClicked: uniqueChoicesClicked.join(' | '),
        uniqueChoicesClickedJSON: JSON.stringify(uniqueChoicesClicked),
        uniqueChoicesClickedCount: String(uniqueChoicesClicked.length),
        choiceSwitchCount: String(choiceSwitchCount),
        addToCartClicks: String(addToCartClicks),
        leaveClicks: String(leaveClicks),
        invalidButtonClicks: String(invalidButtonClicks),
        buttonsEnabledTime,
        optionReviewed,
        uniqueOptionsHovered: hoveredOptions.join(' | '),
        uniqueOptionsHoveredJSON: JSON.stringify(hoveredOptions),
        uniqueOptionsHoveredCount: String(hoveredOptions.length),
        optionHoverStatsJSON: JSON.stringify(optionHoverStats),
        scentOrder: scentOrder.join(' | '),
        scentOrderJSON: JSON.stringify(scentOrder),
        scentOrderArray: [...scentOrder]
      };

      scentOrder.forEach((scent, index) => {
        result[`scentOrder${index + 1}`] = scent;
      });

      SCENTS.forEach((scent) => {
        const fieldKey = scent.replace(/[^A-Za-z0-9]/g, '');
        result[`choiceClicks_${fieldKey}`] = String(choiceClickCounts[scent] || 0);
        result[`hoverTimeMs_${fieldKey}`] = String(optionHoverStats[scent].totalDurationMs);
        result[`hoverEnterCount_${fieldKey}`] = String(optionHoverStats[scent].enterCount);
      });

      window.experimentResult = result;
      localStorage.setItem('lumoraExperimentResult', JSON.stringify(result));
      window.parent.postMessage(result, '*');
    });

    buildOptions();
    window.addEventListener('load', reportContentHeight);
    window.addEventListener('resize', reportContentHeight);
    requestAnimationFrame(reportContentHeight);
  </script>
</body>
</html>
